version: '3.9'

services:
  # Servicio de la app Django
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles  # Nuevo volumen compartido
    ports:
      - "8000"
    env_file:
      - .env
    depends_on:
      - db

  # Servicio de PostgreSQL
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  # --- NUEVO SERVICIO PGADMIN ---
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

# --- NUEVO SERVICIO NGINX ---
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles  # Lee los estáticos de Django
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:  # Declaramos el volumen